name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      # Build must run before typecheck — per-package tsconfigs use the
      # published `exports` map from sibling packages (dist/esm/*.d.ts),
      # so those files have to exist before tsc can resolve cross-package
      # types like @oopsie-exceptions/core from @oopsie-exceptions/node.
      - run: npm run build

      - run: npm run typecheck

      - run: npm run test -- --coverage

      - name: pack dry-run
        run: |
          for pkg in packages/*; do
            echo "--- $pkg ---"
            (cd "$pkg" && npm pack --dry-run)
          done
